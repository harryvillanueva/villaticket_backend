# Nombre de la aplicaciůn
spring.application.name=villaticket-backend

# Conexiůn a Base de Datos
spring.datasource.url=jdbc:mysql://localhost:3306/tfg_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=admin
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuraciůn JPA / Hibernate
# "update": Actualiza el esquema si cambias algo en Java
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Seguridad
logging.level.org.springframework.security=INFO

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=15MB


spring.mail.host=smtp.gmail.com
spring.mail.port=587
