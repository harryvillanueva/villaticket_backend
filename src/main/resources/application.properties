# Nombre de la aplicación
spring.application.name=villaticket-backend

# Conexión a Base de Datos
spring.datasource.url=jdbc:mysql://localhost:3306/tfg_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=admin
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuración JPA / Hibernate
# "update": Actualiza el esquema si cambias algo en Java (útil en desarrollo)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Seguridad (Para evitar bloqueo temporal mientras desarrollamos)
logging.level.org.springframework.security=INFO
