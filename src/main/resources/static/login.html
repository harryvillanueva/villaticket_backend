<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Villaticket - Iniciar Sesión</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="auth-body">

<nav class="navbar" style="border-bottom: none; background: transparent;">
    <div class="nav-container" style="justify-content: center; padding-top: 20px;">
        <a href="index.html" class="logo-area" style="text-decoration: none; font-size: 2rem;">
            <span>🎫</span> Villaticket
        </a>
    </div>
</nav>

<div class="auth-container">
    <div class="auth-card">
        <h2 class="auth-title">Bienvenido de nuevo</h2>
        <p class="auth-subtitle">Inicia sesión para acceder a tus tickets o gestionar tus eventos.</p>

        <form id="loginForm">
            <div class="form-group">
                <label class="form-label" for="email">Correo Electrónico</label>
                <input type="email" id="email" name="email" class="form-control" required placeholder="tu@email.com">
            </div>

            <div class="form-group">
                <label class="form-label" for="password">Contraseña</label>
                <input type="password" id="password" name="password" class="form-control" required placeholder="Tu contraseña">
            </div>

            <div id="loginError" class="error-msg"></div>

            <button type="submit" class="btn btn-primary" style="width: 100%; padding: 12px; margin-top: 10px; font-size: 1rem;" id="btnLogin">
                Iniciar Sesión
            </button>
        </form>

        <p class="auth-footer">¿No tienes cuenta? <a href="registro.html" class="auth-link">Regístrate gratis</a></p>
    </div>
</div>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/login.js"></script>
</body>
</html>
