<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Villaticket - Crear Cuenta</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="auth-body">

<nav class="navbar" style="border-bottom: none; background: transparent;">
    <div class="nav-container" style="justify-content: center; padding-top: 20px;">
        <a href="index.html" class="logo-area" style="text-decoration: none; font-size: 2rem;">
            <span>🎫</span> Villaticket
        </a>
    </div>
</nav>

<div class="auth-container">
    <div class="auth-card">
        <h2 class="auth-title">Crear Cuenta</h2>
        <p class="auth-subtitle">Únete a la mejor plataforma de eventos.</p>

        <form id="registroForm">
            <div class="form-group">
                <label class="form-label" for="nombre">Nombre Completo</label>
                <input type="text" id="nombre" name="nombre" class="form-control" required placeholder="Ej. Harry Villanueva">
            </div>

            <div class="form-group">
                <label class="form-label" for="email">Correo Electrónico</label>
                <input type="email" id="email" name="email" class="form-control" required placeholder="tu@email.com">
            </div>

            <div class="form-group">
                <label class="form-label" for="password">Contraseña</label>
                <input type="password" id="password" name="password" class="form-control" required placeholder="Mínimo 8 caracteres">
            </div>

            <div class="form-group">
                <label class="form-label">¿Cómo usarás Villaticket?</label>
                <div class="role-selector">
                    <div class="role-option active" data-value="CLIENTE">Cliente (Comprar)</div>
                    <div class="role-option" data-value="VENDEDOR">Vendedor (Organizar)</div>
                </div>
                <input type="hidden" id="rol" name="rol" value="CLIENTE">
            </div>

            <div id="registroError" class="error-msg"></div>

            <button type="submit" class="btn btn-primary" style="width: 100%; padding: 12px; margin-top: 10px; font-size: 1rem;" id="btnRegistro">
                Comenzar ahora
            </button>
        </form>

        <p class="auth-footer">¿Ya tienes cuenta? <a href="login.html" class="auth-link">Inicia sesión</a></p>
    </div>
</div>

<script src="js/api.js"></script>
<script src="js/registro.js"></script>

<script>
    document.querySelectorAll('.role-option').forEach(option => {
        option.addEventListener('click', function() {
            document.querySelectorAll('.role-option').forEach(o => o.classList.remove('active'));
            this.classList.add('active');
            document.getElementById('rol').value = this.getAttribute('data-value');
        });
    });
</script>
</body>
</html>
