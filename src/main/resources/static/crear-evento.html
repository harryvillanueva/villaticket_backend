<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Villaticket - Crear Evento</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="auth-body">

<nav class="navbar">
    <div class="nav-container">
        <a href="index.html" class="logo-area" style="text-decoration: none;">
            <span>🎫</span> Villaticket Panel Vendedor
        </a>
        <button class="menu-toggle" id="menuToggle">
            <span></span>
            <span></span>
            <span></span>
        </button>
        <div class="nav-links">
            <a href="#" class="nav-item" id="btnCerrarSesion" style="color: #ff4757;">Cerrar sesión</a>
        </div>
    </div>
</nav>

<div class="container" style="margin-top: 40px; padding-bottom: 50px;">
    <div class="auth-card" style="max-width: 600px; margin: 0 auto;">
        <h2 class="auth-title">Crear Nuevo Evento</h2>
        <p class="auth-subtitle">Completa los datos y sube las imágenes para publicar tu evento.</p>

        <form id="crearEventoForm">
            <div class="form-group">
                <label class="form-label">Título del Evento</label>
                <input type="text" id="titulo" class="form-control" required placeholder="Ej. Concierto Rock">
            </div>

            <div class="form-group">
                <label class="form-label">Descripción detallada</label>
                <textarea id="descripcion" class="form-control" rows="4" required placeholder="Explica de qué trata tu evento, artistas invitados, etc."></textarea>
            </div>

            <div style="display: flex; gap: 15px;">
                <div class="form-group" style="flex: 1;">
                    <label class="form-label">Fecha</label>
                    <input type="date" id="fecha" class="form-control" required>
                </div>
                <div class="form-group" style="flex: 1;">
                    <label class="form-label">Hora</label>
                    <input type="time" id="hora" class="form-control" required>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">Ubicación / Recinto</label>
                <input type="text" id="ubicacion" class="form-control" required placeholder="Ej. Estadio Nacional">
            </div>

            <div class="form-group">
                <label class="form-label">Categoría</label>
                <select id="categoriaId" class="form-control" required>
                    <option value="" disabled selected>Cargando categorías...</option>
                </select>
            </div>

            <div class="form-group">
                <label class="form-label">Imagen Principal (Banner del evento)</label>
                <input type="file" id="imagenPrincipal" class="form-control" accept="image/*" required>
            </div>

            <div class="form-group">
                <label class="form-label">Galería de Imágenes (Opcional)</label>
                <input type="file" id="galeriaImagenes" class="form-control" accept="image/*" multiple>
                <small style="color: var(--text-muted); display: block; margin-top: 5px; font-size: 0.85rem;">
                    Puedes seleccionar varios archivos manteniendo pulsada la tecla Ctrl (o Cmd en Mac).
                </small>
            </div>

            <div id="eventoError" class="error-msg" style="display: none; color: #ff4757; margin-top: 15px;"></div>

            <button type="submit" class="btn btn-primary" style="width: 100%; padding: 12px; margin-top: 20px; font-size: 1rem;" id="btnCrear">
                Guardar Evento y Continuar
            </button>
        </form>
    </div>
</div>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/crear-evento.js"></script>
</body>
</html>
