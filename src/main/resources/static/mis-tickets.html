<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Tickets - Villaticket</title>
    <!-- Enlazamos tu archivo de estilos principal -->
    <link rel="stylesheet" href="css/styles.css">

    <style>
        /* Estilos específicos para que los tickets se vean como una cuadrícula ordenada */
        .tickets-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            padding: 40px 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Un poco de estilo para el título principal */
        .header-title {
            text-align: center;
            margin-top: 40px;
            color: #333;
        }

        .header-subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 20px;
        }
    </style>
</head>
<body style="background-color: #f4f4f9; font-family: Arial, sans-serif; margin: 0;">

<!-- BARRA DE NAVEGACIÓN -->
<header style="background-color: #2c3e50; padding: 15px 20px;">
    <nav style="display: flex; justify-content: space-between; align-items: center; max-width: 1200px; margin: 0 auto;">
        <div class="logo" style="color: white; font-size: 24px; font-weight: bold;">
            🎟️ Villaticket
        </div>
        <div class="menu" style="display: flex; gap: 15px;">
            <a href="index.html" style="color: white; text-decoration: none; padding: 8px 15px; border-radius: 5px; background-color: #34495e;">Ver Eventos</a>
            <a href="#" id="btnCerrarSesion" style="color: white; text-decoration: none; padding: 8px 15px; border-radius: 5px; background-color: #e74c3c;">Cerrar Sesión</a>
        </div>
    </nav>
</header>

<!-- CONTENIDO PRINCIPAL -->
<main>
    <h1 class="header-title">Mis Entradas Compradas</h1>
    <p class="header-subtitle">Presenta estos códigos QR en la entrada del evento.</p>

    <!-- Aquí es donde JavaScript (mis-tickets.js) dibujará las tarjetas de los tickets -->
    <div id="misTicketsGrid" class="tickets-container">
        <p style="text-align: center; width: 100%; color: #555;">Cargando tus tickets...</p>
    </div>
</main>

<!-- SCRIPTS -->
<!-- 1. Librería externa y gratuita para dibujar códigos QR -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<!-- 2. Tus scripts de configuración, seguridad y lógica -->
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/mis-tickets.js"></script>
</body>
</html>
