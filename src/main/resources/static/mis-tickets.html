<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Tickets - Villaticket</title>
    <link rel="stylesheet" href="css/styles.css">

    <style>
        .tickets-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
            padding: 40px 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .header-title { text-align: center; margin-top: 40px; color: #333; }
        .header-subtitle { text-align: center; color: #666; margin-bottom: 20px; }

        /* Estilo para el botón de PDF */
        .btn-pdf {
            margin-top: 15px;
            background-color: #e67e22;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            transition: background 0.3s;
        }
        .btn-pdf:hover { background-color: #d35400; }
    </style>
</head>
<body style="background-color: #f4f4f9; font-family: Arial, sans-serif; margin: 0;">

<header style="background-color: #2c3e50; padding: 15px 20px;">
    <nav style="display: flex; justify-content: space-between; align-items: center; max-width: 1200px; margin: 0 auto;">
        <div class="logo" style="color: white; font-size: 24px; font-weight: bold;">🎟️ Villaticket</div>
        <div class="menu" style="display: flex; gap: 15px;">
            <a href="index.html" style="color: white; text-decoration: none; padding: 8px 15px; border-radius: 5px; background-color: #34495e;">Ver Eventos</a>
            <a href="#" id="btnCerrarSesion" style="color: white; text-decoration: none; padding: 8px 15px; border-radius: 5px; background-color: #e74c3c;">Cerrar Sesión</a>
        </div>
    </nav>
</header>

<main>
    <h1 class="header-title">Mis Entradas Compradas</h1>
    <p class="header-subtitle">Descarga tus entradas nominativas en PDF.</p>

    <div id="misTicketsGrid" class="tickets-container">
        <p style="text-align: center; width: 100%; color: #555;">Cargando tus tickets...</p>
    </div>
</main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/mis-tickets.js"></script>
</body>
</html>
