<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Villaticket - Editar Evento</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="auth-body">

<nav class="navbar">
    <div class="nav-container">
        <a href="dashboard-vendedor.html" class="logo-area" style="text-decoration: none;">
            <span>🎫</span> Volver al Panel
        </a>
    </div>
</nav>

<div class="container" style="margin-top: 40px; padding-bottom: 50px;">
    <div class="auth-card" style="max-width: 600px; margin: 0 auto;">
        <h2 class="auth-title">Editar Evento</h2>
        <p class="auth-subtitle">Modifica los detalles de tu evento.</p>

        <form id="editarEventoForm">
            <div class="form-group">
                <label class="form-label">Título del Evento</label>
                <input type="text" id="titulo" class="form-control" required>
            </div>

            <div class="form-group">
                <label class="form-label">Descripción detallada</label>
                <textarea id="descripcion" class="form-control" rows="4" required></textarea>
            </div>

            <div style="display: flex; gap: 15px;">
                <div class="form-group" style="flex: 1;">
                    <label class="form-label">Fecha</label>
                    <input type="date" id="fecha" class="form-control" required>
                </div>
                <div class="form-group" style="flex: 1;">
                    <label class="form-label">Hora</label>
                    <input type="time" id="hora" class="form-control" required>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">Ubicación / Recinto</label>
                <input type="text" id="ubicacion" class="form-control" required>
            </div>

            <div class="form-group">
                <label class="form-label">Categoría</label>
                <select id="categoriaId" class="form-control" required>
                    <option value="" disabled selected>Cargando categorías...</option>
                </select>
            </div>

            <div class="form-group">
                <label class="form-label">Cambiar Imagen Principal (Opcional)</label>
                <input type="file" id="imagenPrincipal" class="form-control" accept="image/*">
                <small style="color: #aaa;">Si no subes nada, se mantendrá la imagen actual.</small>
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%; padding: 12px; margin-top: 20px;" id="btnActualizar">
                Actualizar Evento
            </button>
        </form>
    </div>
</div>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/editar-evento.js"></script>
</body>
</html>
