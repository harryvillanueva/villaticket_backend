<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Villaticket - Gestionar Zonas</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="auth-body">

<nav class="navbar">
    <div class="nav-container">
        <a href="dashboard-vendedor.html" class="logo-area" style="text-decoration: none;">
            <span>⬅️</span> Volver al Dashboard
        </a>
    </div>
</nav>

<div class="container" style="margin-top: 40px; display: flex; gap: 30px; flex-wrap: wrap;">

    <div class="auth-card" style="flex: 1; min-width: 300px;">
        <h2 class="auth-title" style="text-align: left;">Añadir Zona</h2>
        <p class="auth-subtitle" style="text-align: left;">Define las tarifas y aforo de tu evento.</p>

        <form id="crearZonaForm">
            <div class="form-group">
                <label class="form-label">Nombre de la Zona</label>
                <input type="text" id="nombreZona" class="form-control" required placeholder="Ej. VIP, Platea, General">
            </div>
            <div class="form-group">
                <label class="form-label">Capacidad (Nº de Entradas)</label>
                <input type="number" id="capacidadZona" class="form-control" required placeholder="Ej. 100" min="1">
            </div>
            <div class="form-group">
                <label class="form-label">Precio (€)</label>
                <input type="number" id="precioZona" class="form-control" required placeholder="Ej. 45.50" step="0.01" min="0">
            </div>
            <div id="zonaError" class="error-msg"></div>
            <button type="submit" class="btn btn-primary" style="width: 100%; padding: 12px; margin-top: 10px;">Guardar Zona</button>
        </form>
    </div>

    <div class="auth-card" style="flex: 2; min-width: 300px; background: transparent; border: none; box-shadow: none; padding: 0;">
        <h2 class="auth-title" style="text-align: left;">Zonas Actuales</h2>
        <div id="listaZonas" style="margin-top: 20px; display: flex; flex-direction: column; gap: 15px;">
        </div>
    </div>

</div>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/gestionar-zonas.js"></script>
</body>
</html>
